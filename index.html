<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/terminal.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SSH AI Shell</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <!-- Synchronously apply saved theme before first paint to prevent flash -->
    <script>
      (function() {
        // v2 key: migrates away from old 'app-theme' which may have stale 'light' value
        var t = localStorage.getItem('app-theme-v2') || 'light';
        document.documentElement.setAttribute('data-theme', t);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
