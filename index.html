<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/terminal.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SSH AI Shell</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <!-- Synchronously apply saved theme before first paint to prevent flash -->
    <script>
      (function() {
        function normalizeTheme(value) {
          return value === 'light' ? 'light' : 'dark';
        }
        // v2 key: old experimental themes are now folded back into the default dark terminal theme.
        var t = normalizeTheme(localStorage.getItem('app-theme-v2'));
        document.documentElement.setAttribute('data-theme', t);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
